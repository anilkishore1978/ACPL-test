<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIBERTY Dental Plan - Dashboard</title>

  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
</head>

<body>
  <h2>Dashboard</h2>

  <p id="welcomeUser">Loading user...</p>
  <button id="logoutBtn">Logout</button>
  <div id="status"></div>

  <script>
    // ==========================
    // CONFIG
    // ==========================
    const CLIENT_ID = "d1141f25-2729-4ea5-9892-f80db4205ebf";
    const TENANT_ID = "36090fda-8a83-4040-8c58-7cf784511505";
    const TENANT_HOST = "birlasoftdentalentra.ciamlogin.com";

    const DASHBOARD_PAGE = "https://anilkishore1978.github.io/ACPL-test/dashboard.html";
    const HOME_PAGE = "https://anilkishore1978.github.io/ACPL-test/";

    const msalConfig = {
      auth: {
        clientId: CLIENT_ID,
        authority: `https://${TENANT_HOST}/${TENANT_ID}`,
        knownAuthorities: [TENANT_HOST],
        redirectUri: DASHBOARD_PAGE,
        postLogoutRedirectUri: HOME_PAGE,
        navigateToLoginRequestUrl: false
      },
      cache: {
        cacheLocation: "sessionStorage"
      }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    // ==========================
    // UI HELPER
    // ==========================
    function setUserUI(account) {
      document.getElementById("welcomeUser").textContent =
        "Welcome " + (account.name || account.username);
    }

    // ==========================
    // MAIN AUTH FLOW
    // ==========================
    async function startDashboard() {
      try {
        // 1️⃣ Handle redirect (if coming from login)
        const response = await msalInstance.handleRedirectPromise();

        if (response && response.account) {
          msalInstance.setActiveAccount(response.account);
        }

        // 2️⃣ Get account from cache
        let account = msalInstance.getActiveAccount();

        if (!account) {
          const accounts = msalInstance.getAllAccounts();
          if (accounts.length > 0) {
            account = accounts[0];
            msalInstance.setActiveAccount(account);
          }
        }

        // 3️⃣ 🔥 CRITICAL FIX: App Launcher support
        if (!account) {
          try {
            const silentResponse = await msalInstance.ssoSilent({
              scopes: ["openid", "profile", "email"]
            });

            if (silentResponse && silentResponse.account) {
              msalInstance.setActiveAccount(silentResponse.account);
              account = silentResponse.account;
            }
          } catch (e) {
            console.warn("Silent SSO failed:", e);
          }
        }

        // 4️⃣ Final check
        if (!account) {
          document.getElementById("status").textContent =
            "User not authenticated.";
          return;
        }

        // 5️⃣ Show user
        setUserUI(account);

      } catch (e) {
        console.error("Dashboard error:", e);
        document.getElementById("status").textContent =
          e.errorCode ? `${e.errorCode}: ${e.errorMessage}` : "Authentication error";
      }
    }

    // ==========================
    // LOGOUT
    // ==========================
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        const account = msalInstance.getActiveAccount();
        await msalInstance.logoutRedirect({
          account: account
        });
      } catch (e) {
        console.error("Logout error:", e);
      }
    });

    startDashboard();
  </script>
</body>
</html>
