<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIBERTY Dental Plan - Dashboard</title>

  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>

  <style>
    body { font-family: Arial; padding: 30px; }
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
    .btn { padding: 10px 15px; margin: 5px; cursor: pointer; }
  </style>
</head>

<body>

  <h2>LIBERTY Dental Dashboard</h2>

  <div class="card">
    <p id="status">Initializing...</p>
    <p><strong>Name:</strong> <span id="name">--</span></p>
    <p><strong>Email:</strong> <span id="email">--</span></p>

    <button class="btn" id="loginBtn">Login</button>
    <button class="btn" id="logoutBtn">Logout</button>
  </div>

  <script>
    // ==========================
    // CONFIG
    // ==========================
    const CLIENT_ID = "d1141f25-2729-4ea5-9892-f80db4205ebf";
    const TENANT_ID = "36090fda-8a83-4040-8c58-7cf784511505";
    const TENANT_HOST = "birlasoftdentalentra.ciamlogin.com";

    const REDIRECT_URI = "https://anilkishore1978.github.io/ACPL-test/dashboard.html";

    const msalConfig = {
      auth: {
        clientId: CLIENT_ID,
        authority: `https://${TENANT_HOST}/${TENANT_ID}`,
        knownAuthorities: [TENANT_HOST],
        redirectUri: REDIRECT_URI,
        navigateToLoginRequestUrl: false
      },
      cache: {
        cacheLocation: "localStorage"
      }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    // ==========================
    // UI HELPER
    // ==========================
    function setUser(account) {
      const claims = account.idTokenClaims || {};

      const name =
        claims.name ||
        claims.given_name ||
        claims.preferred_username ||
        "Member";

      const email =
        claims.email ||
        claims.preferred_username ||
        claims.upn ||
        (claims.emails && claims.emails[0]) ||
        "Not available";

      document.getElementById("name").textContent = name;
      document.getElementById("email").textContent = email;
      document.getElementById("status").textContent = "Authenticated";
    }

    // ==========================
    // MAIN FLOW
    // ==========================
    async function init() {
      try {
        // Handle redirect (after login)
        const response = await msalInstance.handleRedirectPromise();

        if (response && response.account) {
          msalInstance.setActiveAccount(response.account);
        }

        let account = msalInstance.getActiveAccount();

        // Check cache
        if (!account) {
          const accounts = msalInstance.getAllAccounts();
          if (accounts.length > 0) {
            account = accounts[0];
            msalInstance.setActiveAccount(account);
          }
        }

        // Silent SSO (for Entra App Launcher)
        if (!account) {
          try {
            const silent = await msalInstance.ssoSilent({
              scopes: ["openid", "profile", "email"]
            });

            if (silent && silent.account) {
              account = silent.account;
              msalInstance.setActiveAccount(account);
            }
          } catch (e) {
            console.warn("Silent SSO failed:", e);
          }
        }

        if (account) {
          setUser(account);
          return;
        }

        // No session
        document.getElementById("status").textContent =
          "Not logged in";

      } catch (e) {
        console.error(e);
        document.getElementById("status").textContent =
          "Authentication error";
      }
    }

    // ==========================
    // BUTTONS
    // ==========================
    document.getElementById("loginBtn").addEventListener("click", () => {
      msalInstance.loginRedirect({
        scopes: ["openid", "profile", "email"]
      });
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      msalInstance.logoutRedirect();
    });

    init();
  </script>

</body>
</html>
