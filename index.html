<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIBERTY Dental Plan - Member Portal</title>

  <link rel="stylesheet" href="./bootstrap-overrides.css">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>

  <style>
    body {
      background: #ffffff;
      color: #333;
      font-family: "Roboto", sans-serif;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: #ffffff;
    }

    .portal-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .brand-top {
      text-align: center;
      padding: 24px 24px 8px;
      background: #fff;
    }

    .brand-top img {
      max-width: 240px;
      height: auto;
      margin: 0 auto 10px;
      display: block;
    }

    .brand-subtitle {
      font-size: 14px;
      color: #494949;
      margin: 0;
    }

    .unified_container {
      margin-bottom: 0 !important;
      color: #333;
    }

    #api {
      padding: 24px;
    }

    .intro-copy {
      text-align: center;
      color: #494949;
      padding-bottom: 18px;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      color: #3352a3;
      font-weight: 500;
      min-height: 22px;
    }

    .footer-brand {
      text-align: center;
      padding: 16px 24px 24px;
      border-top: 1px solid #e9ecef;
    }

    .footer-brand img {
      max-width: 180px;
      height: auto;
      margin: 0 auto;
      display: block;
    }

    @media (max-width: 576px) {
      #api {
        padding: 18px;
      }

      .brand-top {
        padding: 20px 16px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="portal-card">
      <div class="brand-top">
        <img src="./C-Stacked-Horizontal.svg" alt="LIBERTY Dental Plan Logo">
        <p class="brand-subtitle">Member Portal Sign In</p>
      </div>

      <div class="unified_container">
        <div class="heading">
          <h1>Member Login</h1>
        </div>

        <div id="api">
          <div class="intro-copy">
            Please sign in to access your member portal.
          </div>

          <form id="loginForm" novalidate>
            <div class="entry">
              <label for="signInName" id="signInName_label">Username</label>
              <input
                id="signInName"
                type="text"
                placeholder="Username"
                autocomplete="username"
              >
            </div>

            <div class="entry">
              <label for="password" id="password_label">Password</label>
              <input
                id="password"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
              >
            </div>

            <div class="buttons">
              <button id="next" type="submit">Login</button>
            </div>

            <a id="forgotPassword" href="#" onclick="return false;">Forgot Password?</a>

            <div class="create">
              <p>
                Click here to access your account
                <a id="createAccount" href="./registration.html">Register Now</a>
              </p>
            </div>

            <p id="status" aria-live="polite"></p>
          </form>
        </div>
      </div>

      <div class="footer-brand">
        <img src="./C-Stacked-Horizontal.svg" alt="LIBERTY Dental Plan Footer Logo">
      </div>
    </section>
  </main>

  <script>
    const CLIENT_ID = "d1141f25-2729-4ea5-9892-f80db4205ebf";
    const TENANT_ID = "36090fda-8a83-4040-8c58-7cf784511505";
    const TENANT_HOST = "birlasoftdentalentra.ciamlogin.com";
    const HOME_PAGE = "https://anilkishore1978.github.io/ACPL-test/";
    const DASHBOARD_PAGE = "https://anilkishore1978.github.io/ACPL-test/dashboard.html";

    const msalConfig = {
      auth: {
        clientId: CLIENT_ID,
        authority: `https://${TENANT_HOST}/${TENANT_ID}`,
        knownAuthorities: [TENANT_HOST],
        redirectUri: HOME_PAGE,
        navigateToLoginRequestUrl: false
      },
      cache: {
        cacheLocation: "sessionStorage",
        storeAuthStateInCookie: false
      }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    async function initPage() {
      try {
        const response = await msalInstance.handleRedirectPromise();

        if (response && response.account) {
          msalInstance.setActiveAccount(response.account);
          window.location.href = DASHBOARD_PAGE;
          return;
        }

        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          msalInstance.setActiveAccount(accounts[0]);
          window.location.href = DASHBOARD_PAGE;
        }
      } catch (error) {
        console.error("Auth error:", error);
        document.getElementById("status").innerText =
          error.errorCode ? `${error.errorCode}: ${error.errorMessage}` : "Authentication error. Check console (F12).";
      }
    }

    initPage();

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      document.getElementById("status").innerText = "Redirecting to secure sign-in...";

      try {
        await msalInstance.loginRedirect({
          scopes: ["openid", "profile"]
        });
      } catch (error) {
        console.error("Login error:", error);
        document.getElementById("status").innerText =
          error.errorCode ? `${error.errorCode}: ${error.errorMessage}` : "Authentication error. Check console (F12).";
      }
    });
  </script>
</body>
</html>
