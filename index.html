<!DOCTYPE html>
<html>
<head>
  <title>External ID Login</title>
  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>
</head>

<body>

<h3>Login</h3>

<input placeholder="Username">
<input type="password" placeholder="Password">
<br><br>

<button id="loginBtn">Login</button>
<div id="status"></div>

<script>
const msalConfig = {
  auth: {
    clientId: "d1141f25-2729-4ea5-9892-f80db4205ebf",
    authority: "https://birlasoftdentalentra.ciamlogin.com/36090fda-8a83-4040-8c58-7cf784511505",
    knownAuthorities: ["birlasoftdentalentra.ciamlogin.com"],
    redirectUri: "https://anilkishore1978.github.io/ACPL-test/"
  },
  cache: {
    cacheLocation: "sessionStorage"
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

// IMPORTANT: handle redirect fallback
msalInstance.handleRedirectPromise();

document.getElementById("loginBtn").onclick = async () => {
  try {
    const response = await msalInstance.loginPopup({
      scopes: ["openid", "profile", "email"]
    });

    document.getElementById("status").innerText = "Login Success";
    console.log(response);

  } catch (err) {

    // 🔥 fallback if popup blocked
    if (err.errorCode === "block_nested_popups") {
      await msalInstance.loginRedirect({
        scopes: ["openid", "profile", "email"]
      });
    } else {
      document.getElementById("status").innerText = err.message;
    }
  }
};
</script>

</body>
</html>
